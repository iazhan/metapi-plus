appId: io.github.iazhan.metapiplus.desktop
productName: Metapi Plus
artifactName: ${name}-${version}-${os}-${arch}.${ext}
directories:
  output: release
electronDist: node_modules/electron/dist
icon: build/desktop-icon.png
asar: false
files:
  - dist/**/*
  - drizzle/**/*
  - package.json
mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  hardenedRuntime: false
  gatekeeperAssess: false
  entitlementsInherit: null
win:
  target:
    - nsis
    - zip
linux:
  target:
    - AppImage
    - deb
    - rpm
  maintainer: AZhan <46664740+iazhan@users.noreply.github.com>
publish:
  provider: github
  owner: iazhan
  repo: metapi-plus
  releaseType: release
  publishAutoUpdate: true
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
afterPack: scripts/desktop/afterPack.mjs
afterSign: scripts/desktop/afterSign.mjs
