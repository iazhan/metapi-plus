name: Docker Hub Backfill

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: Existing GHCR tag to mirror
        required: true
        type: string
      publish_latest:
        description: Also update the Docker Hub latest tag
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: read

concurrency:
  group: dockerhub-backfill-${{ inputs.source_tag }}
  cancel-in-progress: false

jobs:
  mirror:
    name: Mirror ${{ inputs.source_tag }} to Docker Hub
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SOURCE_IMAGE: ghcr.io/${{ github.repository_owner }}/metapi-plus
      TARGET_IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/metapi-plus
      SOURCE_TAG: ${{ inputs.source_tag }}

    steps:
      - name: Validate source tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$SOURCE_TAG" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Invalid OCI image tag: $SOURCE_TAG" >&2
            exit 1
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y skopeo

      - name: Mirror version tag
        shell: bash
        run: |
          set -euo pipefail
          skopeo copy --all \
            --src-authfile "$HOME/.docker/config.json" \
            --dest-authfile "$HOME/.docker/config.json" \
            "docker://${SOURCE_IMAGE}:${SOURCE_TAG}" \
            "docker://${TARGET_IMAGE}:${SOURCE_TAG}"

      - name: Mirror latest tag
        if: inputs.publish_latest
        shell: bash
        run: |
          set -euo pipefail
          skopeo copy --all \
            --src-authfile "$HOME/.docker/config.json" \
            --dest-authfile "$HOME/.docker/config.json" \
            "docker://${SOURCE_IMAGE}:${SOURCE_TAG}" \
            "docker://${TARGET_IMAGE}:latest"
